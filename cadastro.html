         <form action="conexao.php" method="POST" id="formCadastro" novalidate>

    <!-- Identificação da ação -->

        <label for="senha" class="form-label">Senha</label>
        <input type="password" class="form-control" id="senha" name="senha" minlength="6" required>

        <label for="telefone" class="form-label">Telefone</label>
        <input type="tel" class="form-control" id="telefone" name="telefone" required>
        <div class="mensagem-campo" id="erro-telefone" style="color:red; font-size:0.9em;"></div>
    </div>

    <div class="mb-3">
        <label for="dataNascimento" class="form-label">Data de Nascimento</label>
        <input type="date" class="form-control" id="dataNascimento" name="dataNascimento" required>

            <label for="rua" class="form-label">Rua</label>
            <input type="text" class="form-control" id="rua" name="rua" required>

    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="aceite" required>
        <label class="form-check-label" for="aceite">
            Aceito os termos e condições
        </label>
        <a href="Termos.html" class="nav-item nav-link">Leia os Termos</a>
        <div class="mensagem-campo" id="erro-aceite" style="color:red; font-size:0.9em;"></div>
    </div>

    <div class="mb-3">
        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
    </div>

   <a href="login.html" class="btn btn-secondary w-100 mb-3">Voltar para Login</a> 

</form>

<script>
document.getElementById('formCadastro').addEventListener('submit', function(e) {
    e.preventDefault(); // evita envio do formulário

    const campos = [
        'nome','email','senha','telefone','dataNascimento',
        'cep','numero','rua','bairro','cidade'
    ];

    let todosPreenchidos = true;

    campos.forEach(campo => {
        const input = document.getElementById(campo);
        const erroDiv = document.getElementById('erro-' + campo);
        if (!input.value.trim()) {
            erroDiv.textContent = "Campo obrigatório";
            todosPreenchidos = false;
        } else {
            erroDiv.textContent = "";
        }
    });

    const aceite = document.getElementById('aceite');
    const erroAceite = document.getElementById('erro-aceite');
    if (!aceite.checked) {
        erroAceite.textContent = "Você deve aceitar os termos";
        todosPreenchidos = false;
    } else {
        erroAceite.textContent = "";
    }

    if (todosPreenchidos) {
        this.submit(); // envia o formulário normalmente se tudo estiver preenchido
    }
});
</script>
